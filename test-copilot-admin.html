<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号管理池测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>账号管理池访问测试</h1>

    <div id="login-test" class="test">
        <h3>1. 登录测试</h3>
        <button onclick="testLogin()">测试登录</button>
        <div id="login-result"></div>
    </div>

    <div id="page-test" class="test">
        <h3>2. 页面访问测试</h3>
        <button onclick="testPageAccess()">测试页面访问</button>
        <div id="page-result"></div>
    </div>

    <div id="api-test" class="test">
        <h3>3. API访问测试</h3>
        <button onclick="testApiAccess()">测试API访问</button>
        <div id="api-result"></div>
    </div>

    <script>
        let token = localStorage.getItem('token');

        function showResult(elementId, message, isSuccess = true) {
            const element = document.getElementById(elementId);
            element.innerHTML = message;
            element.className = `test ${isSuccess ? 'success' : 'error'}`;
        }

        async function testLogin() {
            try {
                const response = await fetch('http://localhost:3002/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'cyga6710@gmail.com',
                        password: 'admin123'
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    showResult('login-result',
                        `✅ 登录成功<br>用户: ${data.user.email}<br>角色: ${data.user.role}<br>Token: ${token.substring(0, 20)}...`);
                } else {
                    showResult('login-result', `❌ 登录失败: ${data.error}`, false);
                }
            } catch (error) {
                showResult('login-result', `❌ 网络错误: ${error.message}`, false);
            }
        }

        async function testPageAccess() {
            try {
                const response = await fetch('http://localhost:3002/admin/copilot-accounts', {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });

                if (response.ok) {
                    showResult('page-result', `✅ 页面访问成功 (状态: ${response.status})`);
                } else {
                    showResult('page-result', `❌ 页面访问失败 (状态: ${response.status})`, false);
                }
            } catch (error) {
                showResult('page-result', `❌ 网络错误: ${error.message}`, false);
            }
        }

        async function testApiAccess() {
            if (!token) {
                showResult('api-result', '❌ 请先登录获取token', false);
                return;
            }

            try {
                const response = await fetch('http://localhost:3002/api/admin/copilot-accounts', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok) {
                    showResult('api-result',
                        `✅ API访问成功<br>账号数量: ${data.length}`);
                } else {
                    showResult('api-result', `❌ API访问失败: ${data.error || '未知错误'}`, false);
                }
            } catch (error) {
                showResult('api-result', `❌ 网络错误: ${error.message}`, false);
            }
        }

        // 页面加载时自动检查token
        window.onload = function() {
            if (token) {
                document.getElementById('login-result').innerHTML = '✅ 已检测到本地token';
                document.getElementById('login-result').className = 'test success';
            }
        };
    </script>
</body>
</html>
